<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="고3 학습 일정 플래너 — 일간/주간/월간 뷰 지원">
  <link rel="icon" href="data:,">
  <title>학습 플래너</title>
  <style>
    :root {
      --color-primary: #2563eb;
      --color-primary-hover: #1d4ed8;
      --color-primary-light: #dbeafe;

      --color-text: #0f172a;
      --color-text-muted: #64748b;
      --color-border: #e2e8f0;
      --color-bg: #ffffff;
      --color-bg-alt: #f8fafc;

      --color-success: #16a34a;
      --color-warning: #ea580c;
      --color-error: #dc2626;
      --color-info: #0284c7;

      --font-sans: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', 'Segoe UI', sans-serif;

      --text-xs: 0.75rem;
      --text-sm: 0.875rem;
      --text-base: 1rem;
      --text-lg: 1.125rem;
      --text-xl: 1.25rem;
      --text-2xl: 1.5rem;
      --text-3xl: 1.875rem;

      --leading-tight: 1.25;
      --leading-normal: 1.5;

      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-12: 3rem;

      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 12px;

      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--text-base);
      line-height: var(--leading-normal);
      color: var(--color-text);
      background: var(--color-bg-alt);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    button {
      font-family: inherit;
      font-size: inherit;
      cursor: pointer;
    }

    :focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
      border-radius: var(--radius-sm);
    }

    .app-header {
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      padding: var(--space-4);
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
    }

    .app-header__main {
      flex: 1;
      min-width: 0;
    }

    .app-header__title {
      font-size: var(--text-xl);
      font-weight: 600;
      line-height: var(--leading-tight);
    }

    .app-header__date {
      margin-top: var(--space-1);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }

    .app-main {
      flex: 1;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .tab-nav {
      display: flex;
      gap: var(--space-1);
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-1);
      box-shadow: var(--shadow-sm);
    }

    .tab-button {
      flex: 1;
      padding: var(--space-2) var(--space-3);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--color-text-muted);
      background: transparent;
      border: none;
      border-radius: var(--radius-md);
      transition: background 150ms ease-out, color 150ms ease-out;
    }

    .tab-button:hover:not([aria-selected='true']) {
      background: var(--color-bg-alt);
      color: var(--color-text);
    }

    .tab-button[aria-selected='true'] {
      background: var(--color-primary);
      color: #ffffff;
    }

    .tab-panel {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      min-height: 200px;
      box-shadow: var(--shadow-sm);
    }

    .tab-panel[hidden] {
      display: none;
    }

    .empty-state {
      text-align: center;
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      padding: var(--space-8) var(--space-4);
    }

    .empty-state[hidden] {
      display: none;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .todo-form {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }

    .todo-input {
      flex: 1 1 100%;
      min-width: 0;
      padding: var(--space-3);
      font-family: inherit;
      font-size: var(--text-base);
      color: var(--color-text);
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      transition: border-color 150ms ease-out;
    }

    .todo-input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-light);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-2) var(--space-4);
      font-family: inherit;
      font-size: var(--text-base);
      font-weight: 500;
      line-height: var(--leading-tight);
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      cursor: pointer;
      min-height: 44px;
      transition: background 150ms ease-out, color 150ms ease-out, border-color 150ms ease-out;
    }

    .btn-primary {
      background: var(--color-primary);
      color: #ffffff;
      border-color: var(--color-primary);
    }

    .btn-primary:hover {
      background: var(--color-primary-hover);
      border-color: var(--color-primary-hover);
    }

    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .todo-list:empty {
      display: none;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3);
      background: var(--color-bg-alt);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
    }

    .todo-check {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: var(--color-primary);
    }

    .todo-text {
      flex: 1;
      min-width: 0;
      font-size: var(--text-base);
      color: var(--color-text);
      word-break: break-word;
    }

    .todo-item.is-done .todo-text {
      text-decoration: line-through;
      color: var(--color-text-muted);
    }

    .todo-delete {
      flex-shrink: 0;
      padding: var(--space-2) var(--space-3);
      font-family: inherit;
      font-size: var(--text-sm);
      color: var(--color-error);
      background: transparent;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      min-height: 36px;
      transition: background 150ms ease-out, border-color 150ms ease-out;
    }

    .todo-delete:hover {
      background: #fef2f2;
      border-color: var(--color-error);
    }

    .btn-secondary {
      background: var(--color-bg);
      color: var(--color-text);
      border-color: var(--color-border);
    }

    .btn-secondary:hover {
      background: var(--color-bg-alt);
      border-color: var(--color-text-muted);
    }

    .subject-select {
      flex: 1 1 0;
      min-width: 100px;
      padding: var(--space-3);
      font-family: inherit;
      font-size: var(--text-base);
      color: var(--color-text);
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      cursor: pointer;
    }

    .subject-select:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-light);
    }

    .subject-badge {
      flex-shrink: 0;
      padding: var(--space-1) var(--space-2);
      font-size: var(--text-xs);
      font-weight: 500;
      border-radius: var(--radius-sm);
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .modal {
      width: min(92vw, 480px);
      max-height: 86vh;
      padding: 0;
      border: none;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      background: var(--color-bg);
      color: var(--color-text);
    }

    .modal::backdrop {
      background: rgba(15, 23, 42, 0.5);
    }

    .modal__inner {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      padding: var(--space-6);
      max-height: 86vh;
      overflow-y: auto;
    }

    .modal__title {
      font-size: var(--text-xl);
      font-weight: 600;
      line-height: var(--leading-tight);
    }

    .subject-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .subject-list:empty::after {
      content: '등록된 과목이 없습니다.';
      display: block;
      text-align: center;
      padding: var(--space-4);
      color: var(--color-text-muted);
      font-size: var(--text-sm);
    }

    .subject-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2);
      background: var(--color-bg-alt);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
    }

    .subject-color {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 1px solid var(--color-border);
    }

    .subject-name-input {
      flex: 1;
      min-width: 0;
      padding: var(--space-2);
      font-family: inherit;
      font-size: var(--text-base);
      color: var(--color-text);
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      transition: background 150ms ease-out, border-color 150ms ease-out;
    }

    .subject-name-input:focus {
      outline: none;
      background: var(--color-bg);
      border-color: var(--color-primary);
    }

    .subject-add-form {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
      padding-top: var(--space-3);
      border-top: 1px solid var(--color-border);
    }

    .subject-add-form .todo-input {
      flex: 1 1 140px;
    }

    .color-input {
      width: 44px;
      height: 44px;
      padding: 0;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      background: transparent;
      flex-shrink: 0;
    }

    .app-footer {
      text-align: center;
      padding: var(--space-4);
      color: var(--color-text-muted);
      font-size: var(--text-xs);
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
        animation: none !important;
      }
    }

    @media (min-width: 768px) {
      .app-header {
        padding: var(--space-4) var(--space-6);
      }

      .app-header__main {
        display: flex;
        align-items: baseline;
        gap: var(--space-4);
      }

      .app-header__title {
        font-size: var(--text-2xl);
      }

      .app-header__date {
        margin-top: 0;
      }

      .app-main {
        padding: var(--space-6);
      }

      .tab-button {
        font-size: var(--text-base);
        padding: var(--space-3) var(--space-4);
      }

      .todo-form .todo-input {
        flex: 1 1 0;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="app-header__main">
      <h1 class="app-header__title">학습 플래너</h1>
      <p class="app-header__date" id="todayDate" aria-live="polite"></p>
    </div>
    <button type="button" class="btn btn-secondary" id="manageSubjectsBtn">과목 관리</button>
  </header>

  <main class="app-main">
    <nav class="tab-nav" role="tablist" aria-label="플래너 뷰 전환">
      <button id="tab-day" class="tab-button" type="button" role="tab"
              aria-controls="panel-day" aria-selected="true">일간</button>
      <button id="tab-week" class="tab-button" type="button" role="tab"
              aria-controls="panel-week" aria-selected="false">주간</button>
      <button id="tab-month" class="tab-button" type="button" role="tab"
              aria-controls="panel-month" aria-selected="false">월간</button>
    </nav>

    <section id="panel-day" class="tab-panel" role="tabpanel" aria-labelledby="tab-day">
      <form class="todo-form" id="todoForm" autocomplete="off">
        <label for="todoInput" class="visually-hidden">할 일 입력</label>
        <input id="todoInput" class="todo-input" type="text"
               placeholder="할 일을 입력하세요" maxlength="100" required>
        <label for="subjectSelect" class="visually-hidden">과목 선택</label>
        <select id="subjectSelect" class="subject-select">
          <option value="">과목 없음</option>
        </select>
        <button type="submit" class="btn btn-primary">추가</button>
      </form>
      <ul id="todoList" class="todo-list" aria-label="오늘의 할 일"></ul>
      <p class="empty-state" id="emptyState">오늘 등록된 일정이 없습니다.</p>
    </section>

    <section id="panel-week" class="tab-panel" role="tabpanel" aria-labelledby="tab-week" hidden>
      <p class="empty-state">주간 뷰는 Phase 6에서 구현됩니다.</p>
    </section>

    <section id="panel-month" class="tab-panel" role="tabpanel" aria-labelledby="tab-month" hidden>
      <p class="empty-state">월간 뷰는 Phase 7에서 구현됩니다.</p>
    </section>
  </main>

  <dialog class="modal" id="subjectModal" aria-labelledby="subjectModalTitle">
    <div class="modal__inner">
      <h2 id="subjectModalTitle" class="modal__title">과목 관리</h2>
      <ul class="subject-list" id="subjectList" aria-label="등록된 과목"></ul>
      <form class="subject-add-form" id="subjectAddForm" autocomplete="off">
        <label for="subjectNameInput" class="visually-hidden">새 과목 이름</label>
        <input id="subjectNameInput" class="todo-input" type="text"
               placeholder="새 과목 이름" maxlength="20" required>
        <label for="subjectColorInput" class="visually-hidden">과목 색상</label>
        <input id="subjectColorInput" class="color-input" type="color" value="#2563eb">
        <button type="submit" class="btn btn-primary">추가</button>
      </form>
      <button type="button" class="btn btn-secondary" id="subjectModalClose">닫기</button>
    </div>
  </dialog>

  <footer class="app-footer">
    <small>학습 플래너 v0.4 — Phase 4 (영속성)</small>
  </footer>

  <script>
    'use strict';

    const todayDateEl = document.getElementById('todayDate');
    const today = new Date();
    todayDateEl.textContent = today.toLocaleDateString('ko-KR', {
      year: 'numeric',
      month: 'long',
      day: 'numeric',
      weekday: 'long',
    });

    const tabButtons = Array.from(document.querySelectorAll('[role="tab"]'));
    const tabPanels = Array.from(document.querySelectorAll('[role="tabpanel"]'));

    const activateTab = (targetTab) => {
      tabButtons.forEach((btn) => {
        btn.setAttribute('aria-selected', String(btn === targetTab));
      });
      tabPanels.forEach((panel) => {
        panel.hidden = panel.id !== targetTab.getAttribute('aria-controls');
      });
    };

    tabButtons.forEach((btn) => {
      btn.addEventListener('click', () => activateTab(btn));
    });

    let todos = [];

    const todoForm = document.getElementById('todoForm');
    const todoInput = document.getElementById('todoInput');
    const todoList = document.getElementById('todoList');
    const emptyState = document.getElementById('emptyState');

    const generateId = () => {
      if (window.crypto && typeof window.crypto.randomUUID === 'function') {
        return window.crypto.randomUUID();
      }
      return `todo-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
    };

    const addTodo = (rawText, subjectId) => {
      const text = rawText.trim();
      if (!text) return;
      todos.push({
        id: generateId(),
        text,
        done: false,
        subjectId: subjectId || null,
      });
      saveAll();
      render();
    };

    const toggleTodo = (id) => {
      const todo = todos.find((item) => item.id === id);
      if (!todo) return;
      todo.done = !todo.done;
      saveAll();
      render();
    };

    const deleteTodo = (id) => {
      todos = todos.filter((item) => item.id !== id);
      saveAll();
      render();
    };

    const buildTodoItem = (todo) => {
      const li = document.createElement('li');
      li.className = todo.done ? 'todo-item is-done' : 'todo-item';
      li.dataset.id = todo.id;

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'todo-check';
      checkbox.checked = todo.done;
      checkbox.setAttribute('aria-label', `${todo.text} 완료 여부`);
      li.append(checkbox);

      const subject = todo.subjectId
        ? subjects.find((s) => s.id === todo.subjectId)
        : null;
      if (subject) {
        const badge = document.createElement('span');
        badge.className = 'subject-badge';
        badge.textContent = subject.name;
        badge.style.background = subject.color;
        badge.style.color = getContrastText(subject.color);
        li.append(badge);
      }

      const span = document.createElement('span');
      span.className = 'todo-text';
      span.textContent = todo.text;

      const deleteBtn = document.createElement('button');
      deleteBtn.type = 'button';
      deleteBtn.className = 'todo-delete';
      deleteBtn.textContent = '삭제';
      deleteBtn.setAttribute('aria-label', `${todo.text} 삭제`);

      li.append(span, deleteBtn);
      return li;
    };

    const render = () => {
      todoList.replaceChildren();
      if (todos.length === 0) {
        emptyState.hidden = false;
        return;
      }
      emptyState.hidden = true;
      todos.forEach((todo) => todoList.append(buildTodoItem(todo)));
    };

    todoForm.addEventListener('submit', (event) => {
      event.preventDefault();
      addTodo(todoInput.value, subjectSelect.value);
      todoInput.value = '';
      todoInput.focus();
    });

    todoList.addEventListener('click', (event) => {
      const item = event.target.closest('.todo-item');
      if (!item) return;
      const { id } = item.dataset;
      if (event.target.classList.contains('todo-check')) {
        toggleTodo(id);
      } else if (event.target.classList.contains('todo-delete')) {
        deleteTodo(id);
      }
    });

    const DEFAULT_SUBJECTS = [
      { name: '국어', color: '#dc2626' },
      { name: '수학', color: '#2563eb' },
      { name: '영어', color: '#16a34a' },
      { name: '과학', color: '#ea580c' },
      { name: '탐구', color: '#9333ea' },
    ];

    let subjects = DEFAULT_SUBJECTS.map((subject) => ({
      id: generateId(),
      ...subject,
    }));

    const subjectSelect = document.getElementById('subjectSelect');
    const subjectModal = document.getElementById('subjectModal');
    const subjectList = document.getElementById('subjectList');
    const subjectAddForm = document.getElementById('subjectAddForm');
    const subjectNameInput = document.getElementById('subjectNameInput');
    const subjectColorInput = document.getElementById('subjectColorInput');
    const manageSubjectsBtn = document.getElementById('manageSubjectsBtn');
    const subjectModalClose = document.getElementById('subjectModalClose');

    const getContrastText = (hex) => {
      const match = /^#([0-9a-f]{6})$/i.exec(hex);
      if (!match) return '#ffffff';
      const r = parseInt(match[1].slice(0, 2), 16);
      const g = parseInt(match[1].slice(2, 4), 16);
      const b = parseInt(match[1].slice(4, 6), 16);
      const luminance = 0.299 * r + 0.587 * g + 0.114 * b;
      return luminance > 160 ? '#0f172a' : '#ffffff';
    };

    const addSubject = (rawName, color) => {
      const name = rawName.trim();
      if (!name) return;
      subjects.push({ id: generateId(), name, color });
      saveAll();
      renderSubjectList();
      renderSubjectSelect();
    };

    const updateSubjectName = (id, rawName) => {
      const subject = subjects.find((item) => item.id === id);
      if (!subject) return;
      const name = rawName.trim();
      if (!name) {
        renderSubjectList();
        return;
      }
      subject.name = name;
      saveAll();
      renderSubjectSelect();
      render();
    };

    const deleteSubject = (id) => {
      subjects = subjects.filter((subject) => subject.id !== id);
      todos.forEach((todo) => {
        if (todo.subjectId === id) todo.subjectId = null;
      });
      saveAll();
      renderSubjectList();
      renderSubjectSelect();
      render();
    };

    const renderSubjectSelect = () => {
      const previousValue = subjectSelect.value;
      subjectSelect.replaceChildren();

      const noneOption = document.createElement('option');
      noneOption.value = '';
      noneOption.textContent = '과목 없음';
      subjectSelect.append(noneOption);

      subjects.forEach((subject) => {
        const option = document.createElement('option');
        option.value = subject.id;
        option.textContent = subject.name;
        subjectSelect.append(option);
      });

      if (subjects.some((subject) => subject.id === previousValue)) {
        subjectSelect.value = previousValue;
      }
    };

    const buildSubjectItem = (subject) => {
      const li = document.createElement('li');
      li.className = 'subject-item';
      li.dataset.id = subject.id;

      const colorDot = document.createElement('span');
      colorDot.className = 'subject-color';
      colorDot.style.background = subject.color;

      const nameInput = document.createElement('input');
      nameInput.type = 'text';
      nameInput.className = 'subject-name-input';
      nameInput.value = subject.name;
      nameInput.maxLength = 20;
      nameInput.setAttribute('aria-label', `${subject.name} 이름 수정`);
      nameInput.addEventListener('blur', () => updateSubjectName(subject.id, nameInput.value));
      nameInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          nameInput.blur();
        }
      });

      const deleteBtn = document.createElement('button');
      deleteBtn.type = 'button';
      deleteBtn.className = 'todo-delete';
      deleteBtn.textContent = '삭제';
      deleteBtn.setAttribute('aria-label', `${subject.name} 삭제`);
      deleteBtn.addEventListener('click', () => deleteSubject(subject.id));

      li.append(colorDot, nameInput, deleteBtn);
      return li;
    };

    const renderSubjectList = () => {
      subjectList.replaceChildren();
      subjects.forEach((subject) => subjectList.append(buildSubjectItem(subject)));
    };

    subjectAddForm.addEventListener('submit', (event) => {
      event.preventDefault();
      addSubject(subjectNameInput.value, subjectColorInput.value);
      subjectNameInput.value = '';
      subjectNameInput.focus();
    });

    manageSubjectsBtn.addEventListener('click', () => {
      renderSubjectList();
      subjectModal.showModal();
    });

    subjectModalClose.addEventListener('click', () => {
      subjectModal.close();
    });

    subjectModal.addEventListener('click', (event) => {
      if (event.target === subjectModal) subjectModal.close();
    });

    const STORAGE_KEY = 'study-planner:v1';

    const saveAll = () => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ todos, subjects }));
      } catch (error) {
        alert('데이터를 저장하지 못했습니다. 브라우저 저장소가 가득 찼거나 비활성화되어 있을 수 있습니다.');
      }
    };

    const loadAll = () => {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      try {
        const parsed = JSON.parse(raw);
        if (
          !parsed
          || !Array.isArray(parsed.todos)
          || !Array.isArray(parsed.subjects)
        ) {
          throw new Error('저장된 데이터 형식이 올바르지 않습니다.');
        }
        return parsed;
      } catch (error) {
        alert('저장된 데이터를 읽지 못했습니다. 데이터 형식이 손상됐을 수 있어 기본 상태로 시작합니다.');
        return null;
      }
    };

    const stored = loadAll();
    if (stored) {
      todos = stored.todos;
      subjects = stored.subjects;
    }

    renderSubjectSelect();
    render();
  </script>
</body>
</html>
